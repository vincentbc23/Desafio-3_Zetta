services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zetta-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:8080
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: zetta-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
