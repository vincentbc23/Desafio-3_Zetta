services:
  postgres:
    image: postgres:16-alpine
    container_name: zetta-postgres
    environment:
      POSTGRES_DB: zetta_db
      POSTGRES_USER: zetta
      POSTGRES_PASSWORD: zetta123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zetta-backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - ml-api
    environment:
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:8080
      DATABASE_URL: postgresql://zetta:zetta123@postgres:5432/zetta_db
      WEATHER_API_BASE_URL: https://api.open-meteo.com/v1/forecast
      WEATHER_ARCHIVE_BASE_URL: https://archive-api.open-meteo.com/v1/archive
      ML_API_URL: http://ml-api:8000
      ML_ENABLED: "true"
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: zetta-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  ml-api:
    build: ./ml_api
    container_name: ml_cerrado_api
    ports:
      - "8000:8000"

volumes:
  pgdata:
